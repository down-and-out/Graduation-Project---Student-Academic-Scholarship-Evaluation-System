# ========================================
# 研究生学业奖学金评定系统 - 生产环境配置
# ========================================
# 重要提示：
# 1. 所有敏感配置必须使用环境变量
# 2. 禁止在本文件中存储明文密码
# 3. 生产环境必须启用 HTTPS
# ========================================

# Spring 配置
spring:
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      # 生产环境必须使用环境变量配置数据库连接
      url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:scholarship}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=false
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      # 连接池配置（生产环境优化）
      initial-size: 20
      min-idle: 10
      max-active: 100
      max-wait: 30000
      # 连接有效性检测
      test-while-idle: true
      test-on-borrow: true
      test-on-return: false
      validation-query: SELECT 1
      # 连接泄露检测（生产环境适当放宽）
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 600000
      # 慢 SQL 记录
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 5000
        wall:
          enabled: true
          config:
            multi-statement-allow: false  # 生产环境禁止批量 SQL
            delete-permit: false          # 禁止 DELETE 操作
            truncate-permit: false        # 禁止 TRUNCATE 操作

  # Redis 缓存配置
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB:0}
      timeout: 3000
      ssl:
        enabled: ${REDIS_SSL:false}
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 5000

# 服务器配置（生产环境）
server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: true
    key-store: ${SSL_KEY_STORE}
    key-store-password: ${SSL_KEY_STORE_PASSWORD}
    key-alias: ${SSL_KEY_ALIAS}

# JWT 配置（生产环境）
jwt:
  # 生产环境必须使用足够复杂的密钥（建议 64 位以上随机字符串）
  secret: ${JWT_SECRET}
  # 生产环境适当缩短 Token 有效期
  expiration: 28800000  # 8 小时
  header: Authorization
  prefix: Bearer

# 安全配置
security:
  login:
    max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
    lock-duration: ${LOGIN_LOCK_DURATION:60}
    attempt-expire: ${LOGIN_ATTEMPT_EXPIRE:24}

# 自定义配置
scholarship:
  system:
    # 生产环境禁止使用默认密码
    default-password: ${DEFAULT_PASSWORD}
    name: 研究生学业奖学金评定系统
    version: 1.0.0
  score:
    total-score: 100
    pass-score: 60
  application:
    number-prefix: ${APPLICATION_NUMBER_PREFIX:SCH}

# 日志配置（生产环境）
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  level:
    root: WARN
    com.scholarship: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
  file:
    name: ${LOG_PATH:logs}/scholarship-prod.log
    max-size: 100MB
    max-history: 90

# Knife4j 配置（生产环境关闭）
knife4j:
  enable: false
  production: true

# Flyway 配置
flyway:
  enabled: true
  baseline-on-migrate: true
  validate-on-migrate: true
  clean-disabled: true  # 生产环境禁止清理数据库
