# ========================================
# 研究生学业奖学金评定系统 - 开发环境配置
# ========================================

# Spring 配置
spring:
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/scholarship?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:123456}
      # 连接池配置
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      # 连接有效性检测
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      # 连接泄露检测
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      # 监控统计配置
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
      # 慢 SQL 记录
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000
        wall:
          enabled: true
          config:
            multi-statement-allow: true

  # Redis 缓存配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000

  # Flyway 配置（开发环境暂不启用）
  flyway:
    enabled: false

# 注意：RocketMQ 在本项目中未实际使用，已移除相关配置

# 日志配置（开发环境）
logging:
  level:
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    com.baomidou.mybatisplus: DEBUG
    com.scholarship: DEBUG
  file:
    name: logs/scholarship-dev.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

# JWT 配置（开发环境）
jwt:
  secret: ${JWT_SECRET:dev-secret-key-very-long-and-secure-123456789}
  expiration: 604800000

# 安全配置（登录限流）
security:
  login:
    max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
    lock-duration: ${LOGIN_LOCK_DURATION:30}
    attempt-expire: ${LOGIN_ATTEMPT_EXPIRE:24}

# 自定义配置（开发环境）
scholarship:
  system:
    default-password: ${DEFAULT_PASSWORD:a123456789}
    name: 研究生学业奖学金评定系统
    version: 1.0.0
  score:
    total-score: 100
    pass-score: 60
  application:
    number-prefix: ${APPLICATION_NUMBER_PREFIX:SCH}
