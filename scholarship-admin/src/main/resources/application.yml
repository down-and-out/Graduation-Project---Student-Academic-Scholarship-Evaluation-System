# 自定义业务配置
scholarship:
  # 系统配置
  system:
    # 默认密码（生产环境必须通过环境变量配置）
    default-password: ${DEFAULT_PASSWORD:Default@123}
    # 系统名称
    name: 研究生学业奖学金评定系统
    # 版本
    version: 1.0.0

  # 评分配置
  score:
    # 总分
    total-score: 100
    # 默认及格分
    pass-score: 60

  # 申请编号配置
  application:
    # 申请编号前缀
    number-prefix: ${APPLICATION_NUMBER_PREFIX:SCH}
    # 申请编号格式：{prefix}-{year}-{sequence}

# 日志配置
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  level:
    root: INFO
    com.scholarship: DEBUG
    com.scholarship.mapper: DEBUG
