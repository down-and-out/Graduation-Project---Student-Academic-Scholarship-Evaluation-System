# ========================================
# 研究生学业奖学金评定系统 - 主配置文件
# ========================================

# Spring Boot 核心配置
spring:
  application:
    name: scholarship-admin  # 应用名称

  # 环境配置：dev(开发), test(测试), prod(生产)
  profiles:
    active: dev

  # Jackson JSON 序列化配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss      # 日期格式
    time-zone: GMT+8                      # 时区设置
    serialization:
      write-dates-as-timestamps: false   # 不使用时间戳格式
    default-property-inclusion: non_null # null 值不序列化

  # 文件上传配置
  servlet:
    multipart:
      enabled: true              # 启用文件上传
      max-file-size: 10MB        # 单个文件最大 10MB
      max-request-size: 50MB     # 请求最大 50MB

# 服务器配置
server:
  port: 8080                    # 服务端口
  servlet:
    context-path: /api          # 上下文路径
  compression:
    enabled: true               # 启用响应压缩
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  # 实体类包路径
  type-aliases-package: com.scholarship.entity
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志实现
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      # 主键类型：AUTO(数据库自增), ASSIGN_ID(雪花算法)
      id-type: AUTO
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1       # 已删除值
      logic-not-delete-value: 0   # 未删除值

# Knife4j API 文档配置
knife4j:
  enable: true                    # 是否启用
  setting:
    language: zh_cn              # 语言设置
    enable-swagger-models: true  # 启用 Swagger 模型
    enable-document-cache: true  # 启用文档缓存
  production: false              # 生产环境关闭

# JWT 配置
jwt:
  # JWT 密钥（生产环境请使用更复杂的密钥并配置在环境变量中）
  # 如果环境变量未设置，使用默认值（仅用于开发环境）
  secret: ${JWT_SECRET:defaultDevSecretKeyForDevelopmentEnvironmentOnly1234567890}
  # Token 过期时间：2 小时（单位：毫秒）
  # 生产环境建议使用更短的过期时间（如 30 分钟）并配合刷新 Token 机制
  expiration: 7200000
  # Token 请求头名称
  header: Authorization
  # Token 前缀
  prefix: Bearer

